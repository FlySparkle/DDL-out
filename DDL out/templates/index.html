<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDL out! - 待办事项可视化</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>DDL out!</h1>
        <div class="header-actions">
            <button id="clear-all-btn" class="btn-danger btn-sm" title="清空全部分类">🗑️ 清空分类</button>
            <button id="clear-completed-btn" class="btn-secondary btn-sm" title="清除已完成事项">🧹 清除已完成</button>
            <button id="add-category-btn" class="btn-secondary">+ 新建分类</button>
        </div>
    </header>

    <main>
        <!-- 任务看板容器 -->
        <div id="kanban-board" class="kanban-board">
            <!-- 动态生成分类列 -->
        </div>
    </main>

    <!-- 任务模态框 (添加/编辑) -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title">新建任务</h2>
            <form id="task-form">
                <input type="hidden" id="task-id">
                <div class="form-group">
                    <label for="task-name">事项名称 (必填)</label>
                    <input type="text" id="task-name" required placeholder="请输入事项名称">
                </div>
                
                <div class="form-group">
                    <label>截止时间 (必填)</label>
                    <div class="deadline-tabs">
                        <button type="button" class="tab-btn active" data-tab="tab-remaining">剩余时间</button>
                        <button type="button" class="tab-btn" data-tab="tab-absolute">绝对时间</button>
                    </div>
                    
                    <!-- 剩余时间模式 -->
                    <div id="tab-remaining" class="tab-pane active">
                        <div class="time-inputs">
                            <div class="time-input-group">
                                <input type="text" id="rem-day" value="0" inputmode="numeric" maxlength="3" aria-label="剩余天数">
                                <span class="label">日</span>
                            </div>
                            <div class="time-input-group">
                                <input type="text" id="rem-hour" value="0" inputmode="numeric" maxlength="3" aria-label="剩余小时数">
                                <span class="label">时</span>
                            </div>
                            <div class="time-input-group">
                                <input type="text" id="rem-minute" value="0" inputmode="numeric" maxlength="3" aria-label="剩余分钟数">
                                <span class="label">分</span>
                            </div>
                        </div>
                        <div class="wheel-picker-container remaining-wheel-picker">
                            <div class="wheel-column" id="wheel-rem-day" tabindex="0" aria-label="滚轮选择剩余天数"></div>
                            <div class="wheel-separator wheel-unit">日</div>
                            <div class="wheel-column" id="wheel-rem-hour" tabindex="0" aria-label="滚轮选择剩余小时数"></div>
                            <div class="wheel-separator wheel-unit">时</div>
                            <div class="wheel-column" id="wheel-rem-minute" tabindex="0" aria-label="滚轮选择剩余分钟数"></div>
                            <div class="wheel-separator wheel-unit">分</div>
                            <div class="wheel-highlight"></div>
                        </div>
                        <div class="input-hint" id="rem-hint"></div>
                    </div>

                    <!-- 绝对时间模式 -->
                    <div id="tab-absolute" class="tab-pane">
                        <div class="abs-date-picker">
                            <input type="date" id="abs-date" required>
                        </div>
                        <div class="abs-time-picker">
                            <label class="picker-label">时间</label>
                            <div class="time-inputs absolute-time-inputs">
                                <div class="time-input-group">
                                    <input type="text" id="abs-hour" value="0" inputmode="numeric" maxlength="2" aria-label="绝对时间小时">
                                    <span class="label">时</span>
                                </div>
                                <div class="time-input-group">
                                    <input type="text" id="abs-minute" value="0" inputmode="numeric" maxlength="2" aria-label="绝对时间分钟">
                                    <span class="label">分</span>
                                </div>
                            </div>
                            <div class="wheel-picker-container">
                                <div class="wheel-column" id="wheel-hour" tabindex="0">
                                    <!-- JS will populate -->
                                </div>
                                <div class="wheel-separator">:</div>
                                <div class="wheel-column" id="wheel-minute" tabindex="0">
                                    <!-- JS will populate -->
                                </div>
                                <div class="wheel-highlight"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="task-category">所属分类</label>
                    <select id="task-category" required>
                        <!-- 动态填充 -->
                    </select>
                </div>
                
                <div class="modal-actions">
                    <button type="submit" class="btn-primary">保存</button>
                    <button type="button" id="delete-task-btn" class="btn-danger" style="display:none;">删除</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 分类模态框 -->
    <div id="category-modal" class="modal">
        <div class="modal-content">
            <span class="close-cat">&times;</span>
            <h2>管理分类</h2>
            <form id="category-form">
                <input type="hidden" id="cat-id">
                <div class="form-group">
                    <label for="cat-name">分类名称</label>
                    <input type="text" id="cat-name" required>
                </div>
                <div class="form-group">
                    <label>分类颜色</label>
                    <div id="color-palette" class="color-palette">
                        <!-- JS动态生成配色方案 -->
                    </div>
                    <!-- 隐藏的原生颜色选择器 -->
                    <input type="color" id="cat-color-input">
                    <!-- 存储最终选择的颜色值 -->
                    <input type="hidden" id="cat-color" value="#4a90e2">
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-primary">保存</button>
                    <button type="button" id="delete-cat-btn" class="btn-danger" style="display:none;">删除</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 自定义确认弹窗 -->
    <div id="confirm-modal" class="modal">
        <div class="modal-content confirm-content">
            <h3 id="confirm-title">确认操作</h3>
            <p id="confirm-message">确定要执行此操作吗？</p>
            <div class="modal-actions">
                <button id="confirm-cancel-btn" class="btn-secondary">取消</button>
                <button id="confirm-ok-btn" class="btn-danger">确认</button>
            </div>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
