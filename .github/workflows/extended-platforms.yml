name: Apple Platform Builds

on:
  workflow_dispatch:
    inputs:
      target:
        description: Apple platform build to run
        required: true
        default: all
        type: choice
        options:
          - all
          - ios
          - macos

permissions:
  contents: read

env:
  FLUTTER_VERSION: 3.44.6

jobs:
  ios:
    name: Build signed iOS IPA
    if: inputs.target == 'all' || inputs.target == 'ios'
    runs-on: macos-latest
    env:
      IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
      IOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
      IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - name: Configure iOS signing
        shell: bash
        run: |
          test -n "$IOS_CERTIFICATE_BASE64"
          test -n "$IOS_CERTIFICATE_PASSWORD"
          test -n "$IOS_PROVISION_PROFILE_BASE64"
          test -n "$IOS_EXPORT_OPTIONS_PLIST_BASE64"
          test -n "$IOS_KEYCHAIN_PASSWORD"
          certificate_path="$RUNNER_TEMP/ddl-out-distribution.p12"
          keychain_path="$RUNNER_TEMP/ddl-out-signing.keychain-db"
          profile_path="$HOME/Library/MobileDevice/Provisioning Profiles/ddl-out.mobileprovision"
          printf '%s' "$IOS_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"
          mkdir -p "$(dirname "$profile_path")"
          printf '%s' "$IOS_PROVISION_PROFILE_BASE64" | base64 -D > "$profile_path"
          printf '%s' "$IOS_EXPORT_OPTIONS_PLIST_BASE64" | base64 -D > ios/ExportOptions.plist
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path" login.keychain-db
      - run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
      - name: Name IPA
        shell: bash
        run: |
          version=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          version=${version%%+*}
          mv build/ios/ipa/*.ipa "DDL_out_v${version}-ios.ipa"
      - uses: actions/upload-artifact@v4
        with:
          name: ddl-out-ios-ipa
          path: DDL_out_v*-ios.ipa
          if-no-files-found: error
          retention-days: 14

  macos:
    name: Build macOS DMG
    if: inputs.target == 'all' || inputs.target == 'macos'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build macos --release
      - name: Create DMG
        shell: bash
        run: |
          version=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          version=${version%%+*}
          app=$(find build/macos/Build/Products/Release -maxdepth 1 -type d -name '*.app' -print -quit)
          test -n "$app"
          hdiutil create -volname 'DDL out!' -srcfolder "$app" -ov -format UDZO "DDL_out_v${version}-macos.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: ddl-out-macos-dmg
          path: DDL_out_v*-macos.dmg
          if-no-files-found: error
          retention-days: 14
