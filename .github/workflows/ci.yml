name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.6
  PROJECT_DIR: .

jobs:
  quality:
    name: Format, analyze, and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: dart run build_runner build --force-jit
      - run: flutter gen-l10n
      - name: Verify generated sources are committed
        run: git diff --exit-code
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build windows --release
      - shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ddl-out-windows-x64.zip -CompressionLevel Optimal
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64-${{ github.sha }}
          path: ddl-out-windows-x64.zip
          if-no-files-found: error
          retention-days: 14

  android:
    name: Build Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build apk --release --target-platform android-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
