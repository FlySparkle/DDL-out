name: Flutter CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FLUTTER_VERSION: 3.44.6
  PROJECT_DIR: ddl_out_flutter

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --force-jit
      - run: flutter gen-l10n
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows --release
      - shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ddl-out-v0.1.0-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: ddl-out-windows-x64
          path: ddl_out_flutter/ddl-out-v0.1.0-windows-x64.zip

  android:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Configure Android release signing
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-key.jks
          {
            echo "storePassword=$ANDROID_STORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=release-key.jks"
          } > android/key.properties
      - run: flutter build apk --release
      - run: mv build/app/outputs/flutter-apk/app-release.apk ddl-out-v0.1.0-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: ddl-out-android
          path: ddl_out_flutter/ddl-out-v0.1.0-android.apk
