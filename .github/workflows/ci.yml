name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.44.6
  PROJECT_DIR: .

jobs:
  quality:
    name: Format, analyze, and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: dart run build_runner build --force-jit
      - run: flutter gen-l10n
      - name: Verify generated sources are committed
        run: git diff --exit-code
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build windows --release
      - shell: pwsh
        run: |
          $version = ([regex]::Match((Get-Content pubspec.yaml -Raw), '(?m)^version:\s*([^+\r\n]+)')).Groups[1].Value
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "DDL_out_v$version-windows-x64-portable.zip" -CompressionLevel Optimal
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64-${{ github.sha }}
          path: DDL_out_v*-windows-x64-portable.zip
          if-no-files-found: error
          retention-days: 14

  android:
    name: Build Android ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android-arm64
            abi: arm64-v8a
          - target: android-x64
            abi: x64
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build apk --release --target-platform ${{ matrix.target }}
      - name: Name APK
        shell: bash
        run: |
          version=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          version=${version%%+*}
          mv build/app/outputs/flutter-apk/app-release.apk "DDL_out_v${version}-android-${{ matrix.abi }}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}-${{ github.sha }}
          path: DDL_out_v*-android-${{ matrix.abi }}.apk
          if-no-files-found: error
          retention-days: 14
