name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: 3.44.6
  PROJECT_DIR: .

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    outputs:
      git_commit: ${{ steps.build_metadata.outputs.git_commit }}
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve build metadata
        id: build_metadata
        shell: bash
        run: echo "git_commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Verify tag matches application version
        shell: bash
        run: |
          version=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          version=${version%%+*}
          test "$GITHUB_REF_NAME" = "v$version"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: dart run build_runner build --force-jit
      - run: flutter gen-l10n
      - name: Verify generated sources are committed
        run: git diff --exit-code
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  check-secrets:
    name: Check signing secrets
    runs-on: ubuntu-latest
    outputs:
      ios_ready: ${{ steps.ios.outputs.ready }}
      android_ready: ${{ steps.android.outputs.ready }}
    steps:
      - id: ios
        shell: bash
        run: |
          if [ -n "${{ secrets.IOS_CERTIFICATE_BASE64 }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - id: android
        shell: bash
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

  windows:
    name: Package Windows release
    needs: verify
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build windows --release --dart-define=GIT_COMMIT=${{ needs.verify.outputs.git_commit }}
      - shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "DDL_out_$env:GITHUB_REF_NAME-windows-x64-portable.zip" -CompressionLevel Optimal
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: DDL_out_v*-windows-x64-portable.zip
          if-no-files-found: error

  android:
    name: Package signed Android ${{ matrix.abi }} release
    needs: [verify, check-secrets]
    if: needs.check-secrets.outputs.android_ready == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android-arm64
            abi: arm64-v8a
          - target: android-x64
            abi: x64
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - name: Require and configure release signing
        shell: bash
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_STORE_PASSWORD"
          test -n "$ANDROID_KEY_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-key.jks
          {
            echo "storePassword=$ANDROID_STORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=release-key.jks"
          } > android/key.properties
      - run: flutter build apk --release --target-platform ${{ matrix.target }} --dart-define=GIT_COMMIT=${{ needs.verify.outputs.git_commit }}
      - name: Name release asset
        shell: bash
        run: mv build/app/outputs/flutter-apk/app-release.apk "DDL_out_$GITHUB_REF_NAME-android-${{ matrix.abi }}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}-release
          path: DDL_out_v*-android-${{ matrix.abi }}.apk
          if-no-files-found: error

  linux:
    name: Package Linux release
    needs: verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev rpm ruby-full
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build linux --release --dart-define=GIT_COMMIT=${{ needs.verify.outputs.git_commit }}
      - name: Create DEB and RPM packages
        shell: bash
        run: |
          sudo gem install --no-document fpm
          version=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          version=${version%%+*}
          output_dir="$GITHUB_WORKSPACE/build/linux/x64/release"
          bundle_dir="$output_dir/bundle"
          fpm -s dir -t deb -n ddl-out -v "$version" --architecture amd64 --prefix /opt/ddl-out -C "$bundle_dir" -p "$output_dir/DDL_out_v${version}-linux-amd64.deb" .
          fpm -s dir -t rpm -n ddl-out -v "$version" --architecture x86_64 --prefix /opt/ddl-out -C "$bundle_dir" -p "$output_dir/DDL_out_v${version}-linux-amd64.rpm" .
          tar -C "$bundle_dir" -czf "$output_dir/DDL_out_v${version}-linux-amd64.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            build/linux/x64/release/DDL_out_v*-linux-amd64.deb
            build/linux/x64/release/DDL_out_v*-linux-amd64.rpm
            build/linux/x64/release/DDL_out_v*-linux-amd64.tar.gz
          if-no-files-found: error

  macos:
    name: Package macOS DMG release
    needs: verify
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build macos --release --dart-define=GIT_COMMIT=${{ needs.verify.outputs.git_commit }}
      - name: Create DMG
        shell: bash
        run: |
          version=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          version=${version%%+*}
          app=$(find build/macos/Build/Products/Release -maxdepth 1 -type d -name '*.app' -print -quit)
          test -n "$app"
          hdiutil create -volname 'DDL out!' -srcfolder "$app" -ov -format UDZO "DDL_out_$GITHUB_REF_NAME-macos.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: DDL_out_v*-macos.dmg
          if-no-files-found: error

  ios:
    name: Package iOS IPA release
    needs: [verify, check-secrets]
    runs-on: macos-latest
    env:
      IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
      IOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
      IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - name: Configure iOS signing
        id: signing
        continue-on-error: true
        shell: bash
        run: |
          test -n "$IOS_CERTIFICATE_BASE64"
          test -n "$IOS_CERTIFICATE_PASSWORD"
          test -n "$IOS_PROVISION_PROFILE_BASE64"
          test -n "$IOS_EXPORT_OPTIONS_PLIST_BASE64"
          test -n "$IOS_KEYCHAIN_PASSWORD"
          certificate_path="$RUNNER_TEMP/ddl-out-distribution.p12"
          keychain_path="$RUNNER_TEMP/ddl-out-signing.keychain-db"
          profile_source="$RUNNER_TEMP/ddl-out.mobileprovision"
          profile_plist="$RUNNER_TEMP/ddl-out-profile.plist"
          printf '%s' "$IOS_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"
          printf '%s' "$IOS_PROVISION_PROFILE_BASE64" | base64 -D > "$profile_source"
          security cms -D -i "$profile_source" > "$profile_plist"
          profile_uuid=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_plist")
          profile_team_id=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$profile_plist")
          profile_app_id=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$profile_plist")
          profile_get_task_allow=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$profile_plist")
          test "$profile_team_id" = "95G86VA5XB"
          case "$profile_app_id" in
            "$profile_team_id.com.flysparkle.ddlOut"|"$profile_team_id.com.flysparkle.*") ;;
            *) echo "The provisioning profile does not cover com.flysparkle.ddlOut." >&2; exit 1 ;;
          esac
          test "$profile_get_task_allow" = "false" || {
            echo "IOS_PROVISION_PROFILE_BASE64 must contain a distribution provisioning profile." >&2
            exit 1
          }
          profile_path="$HOME/Library/MobileDevice/Provisioning Profiles/$profile_uuid.mobileprovision"
          mkdir -p "$(dirname "$profile_path")"
          cp "$profile_source" "$profile_path"
          printf '%s' "$IOS_EXPORT_OPTIONS_PLIST_BASE64" | base64 -D > ios/ExportOptions.plist
          export_method=$(/usr/libexec/PlistBuddy -c 'Print :method' ios/ExportOptions.plist)
          case "$export_method" in
            app-store|app-store-connect|ad-hoc|release-testing|enterprise) ;;
            *) echo "ExportOptions.plist must use a distribution export method." >&2; exit 1 ;;
          esac
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$IOS_CERTIFICATE_PASSWORD" -A -f pkcs12 -k "$keychain_path"
          security default-keychain -s "$keychain_path"
          security list-keychain -d user -s "$keychain_path"
          identity_count=$(security find-identity -v -p codesigning "$keychain_path" | grep -Ec '^[[:space:]]*[0-9]+\)' || true)
          test "$identity_count" -gt 0
          security set-key-partition-list -S apple-tool:,apple: -s -k "$IOS_KEYCHAIN_PASSWORD" "$keychain_path"
          signing_identity=$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/.*"\(.*\)"/\1/p' | grep -E '^(Apple|iPhone) Distribution:' | head -n 1)
          test -n "$signing_identity" || {
            echo "IOS_CERTIFICATE_BASE64 must contain an Apple Distribution certificate." >&2
            exit 1
          }
          printf '%s\n' \
            'CODE_SIGN_STYLE = Manual' \
            "CODE_SIGN_IDENTITY[sdk=iphoneos*] = $signing_identity" \
            "PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*] = $profile_uuid" \
            > ios/Flutter/Signing.xcconfig
          security find-identity -v -p codesigning "$keychain_path"
      - name: Build signed iOS IPA
        id: signed_ipa
        if: steps.signing.outcome == 'success'
        continue-on-error: true
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist --dart-define=GIT_COMMIT=${{ needs.verify.outputs.git_commit }}
      - name: Name signed IPA
        if: steps.signed_ipa.outcome == 'success'
        shell: bash
        run: |
          mv build/ios/ipa/*.ipa "DDL_out_$GITHUB_REF_NAME-ios.ipa"
      - name: Build unsigned iOS IPA fallback
        if: steps.signing.outcome != 'success' || steps.signed_ipa.outcome == 'failure'
        shell: bash
        run: |
          flutter build ios --release --no-codesign --dart-define=GIT_COMMIT=${{ needs.verify.outputs.git_commit }}
          rm -rf Payload
          ln -s build/ios/iphoneos Payload
          if [ -d Payload/Runner.app/Frameworks ]; then
            find Payload/Runner.app/Frameworks -type d -name '*.framework' -exec codesign --force --sign - --preserve-metadata=identifier,entitlements {} \;
          fi
          zip -r9 "DDL_out_$GITHUB_REF_NAME-ios-unsigned.ipa" Payload/Runner.app
      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: DDL_out_v*-ios*.ipa
          if-no-files-found: error

  windows-arm64:
    name: Package Windows ARM64 release
    needs: verify
    runs-on: windows-11-arm
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Flutter (manual clone for ARM64)
        shell: pwsh
        working-directory: ${{ runner.temp }}
        run: |
          git clone --depth 1 --branch ${{ env.FLUTTER_VERSION }} https://github.com/flutter/flutter.git flutter
          Add-Content $env:GITHUB_PATH "${{ runner.temp }}\flutter\bin"
      - run: flutter doctor
      - run: flutter pub get --enforce-lockfile
      - run: flutter build windows --release --dart-define=GIT_COMMIT=${{ needs.verify.outputs.git_commit }}
      - shell: pwsh
        run: Compress-Archive -Path build/windows/arm64/runner/Release/* -DestinationPath "DDL_out_$env:GITHUB_REF_NAME-windows-arm64-portable.zip" -CompressionLevel Optimal
      - uses: actions/upload-artifact@v4
        with:
          name: windows-arm64-release
          path: DDL_out_v*-windows-arm64-portable.zip
          if-no-files-found: error

  publish:
    name: Create GitHub release
    needs: [windows, windows-arm64, android, linux, macos, ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-release"
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release/*
          fail_on_unmatched_files: true
