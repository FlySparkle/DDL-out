name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: 3.44.6
  PROJECT_DIR: ddl_out_flutter

jobs:
  verify:
    name: Verify release source
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches application version
        shell: bash
        run: |
          version=$(awk '/^version:/ {print $2; exit}' pubspec.yaml)
          version=${version%%+*}
          test "$GITHUB_REF_NAME" = "v$version"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: dart run build_runner build --force-jit
      - run: flutter gen-l10n
      - name: Verify generated sources are committed
        run: git diff --exit-code
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  windows:
    name: Package Windows release
    needs: verify
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - run: flutter build windows --release
      - shell: pwsh
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "ddl-out-$env:GITHUB_REF_NAME-windows-x64.zip" -CompressionLevel Optimal
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ddl_out_flutter/ddl-out-*-windows-x64.zip
          if-no-files-found: error

  android:
    name: Package signed Android release
    needs: verify
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get --enforce-lockfile
      - name: Require and configure release signing
        shell: bash
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_STORE_PASSWORD"
          test -n "$ANDROID_KEY_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release-key.jks
          {
            echo "storePassword=$ANDROID_STORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=release-key.jks"
          } > android/key.properties
      - run: flutter build apk --release
      - name: Name release asset
        shell: bash
        run: mv build/app/outputs/flutter-apk/app-release.apk "ddl-out-$GITHUB_REF_NAME-android.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: ddl_out_flutter/ddl-out-*-android.apk
          if-no-files-found: error

  publish:
    name: Create GitHub release
    needs: [windows, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-release"
          path: release
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release/*
          fail_on_unmatched_files: true
