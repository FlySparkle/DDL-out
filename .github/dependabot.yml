version: 2
updates:
  - package-ecosystem: pub
    directory: /ddl_out_flutter
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      flutter-dependencies:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
